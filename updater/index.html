<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: "Inter", system-ui, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      border: 1px solid #333;
      -webkit-app-region: drag;
    }
    .container { text-align: center; width: 85%; -webkit-app-region: no-drag; }
    h2 { margin-bottom: 15px; font-weight: 700; color: #4a90e2; font-size: 18px; }
    #status { font-size: 12px; color: #888; margin-bottom: 12px; height: 1.2em; }
    .progress-bg { background: #222; height: 8px; border-radius: 4px; width: 100%; overflow: hidden; }
    #progress-fill { background: #4a90e2; height: 100%; width: 0%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px rgba(74, 144, 226, 0.5); }
    #error-msg { color: #ef4444; font-size: 12px; margin-top: 15px; display: none; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 4px; }
    .close-btn { position: absolute; top: 12px; right: 12px; cursor: pointer; color: #555; -webkit-app-region: no-drag; font-size: 14px; }
    .close-btn:hover { color: white; }
  </style>
</head>
<body>
  <div class="close-btn" onclick="window.ipcRenderer.send('close-updater')">✕</div>
  <div class="container">
    <h2>Updating Inkflow</h2>
    <div id="status">Connecting to server...</div>
    <div class="progress-bg">
      <div id="progress-fill"></div>
    </div>
    <div id="error-msg"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    window.ipcRenderer = ipcRenderer;

    // Get parameters from the launch arguments (querystring)
    const params = new URLSearchParams(window.location.search);
    const updateUrl = params.get('url');
    const assetName = params.get('asset') || 'Inkflow-Setup.exe';

    if (updateUrl) {
      ipcRenderer.send('download-update', { url: updateUrl, assetName });
    }

    ipcRenderer.on('update-progress', (event, progress) => {
      document.getElementById('progress-fill').style.width = progress + '%';
      document.getElementById('status').textContent = `Downloading Update: ${progress}%`;
    });

    ipcRenderer.on('status', (event, msg) => {
      document.getElementById('status').textContent = msg;
    });

    ipcRenderer.on('error', (event, msg) => {
      document.getElementById('status').style.display = 'none';
      const err = document.getElementById('error-msg');
      err.textContent = 'Error: ' + msg;
      err.style.display = 'block';
    });
  </script>
</body>
</html>
